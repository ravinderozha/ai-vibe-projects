<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainy Highway Scene</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: #5d7ea3;
}
canvas {
  display: block;
}
#title {
  position: fixed;
  top: 10px;
  left: 15px;
  color: white;
  font-family: Arial;
  background: rgba(0,0,0,0.3);
  padding: 8px 12px;
  border-radius: 8px;
}
</style>
</head>
<body>

<div id="title">Rainy Traffic Highway</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

function rand(a,b){ return Math.random()*(b-a)+a; }

// ================= OBJECTS =================

let cars = [];
let rain = [];
let birds = [];

// Cars
for(let i=0;i<6;i++){
  cars.push({x:-200*i, y:h*0.7, speed:3+Math.random()*2, color:["red","yellow","cyan","orange"][i%4]});
}
for(let i=0;i<6;i++){
  cars.push({x:w+200*i, y:h*0.55, speed:-4-Math.random()*2, color:["white","blue","pink","green"][i%4]});
}

// Rain
for(let i=0;i<200;i++){
  rain.push({x:rand(0,w), y:rand(0,h)});
}

// Birds
for(let i=0;i<6;i++){
  birds.push({x:rand(0,w), y:rand(50,h*0.3), speed:2+Math.random()*2});
}

// ================= DRAW =================

function drawMountainLayer(y, scale, color){
  ctx.fillStyle = color;
  for(let x=-100; x<w+200; x+=200){
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x+100,y-120*scale);
    ctx.lineTo(x+200,y);
    ctx.fill();
  }
}

function drawTree(x,y){
  // trunk
  ctx.fillStyle="#4a2f17";
  ctx.fillRect(x,y,12,40);

  // leaves
  ctx.beginPath();
  ctx.arc(x+6,y,20,0,Math.PI*2);
  ctx.fillStyle="green";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x-10,y+10,15,0,Math.PI*2);
  ctx.fillStyle="darkgreen";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x+18,y+10,15,0,Math.PI*2);
  ctx.fillStyle="limegreen";
  ctx.fill();
}

function drawRoad(y){
  ctx.fillStyle="#2f2f2f";
  ctx.fillRect(0,y,w,80);

  ctx.strokeStyle="white";
  ctx.lineWidth=3;

  for(let i=0;i<w;i+=60){
    ctx.beginPath();
    ctx.moveTo(i,y+40);
    ctx.lineTo(i+30,y+40);
    ctx.stroke();
  }
}

function drawCar(c){
  // body
  ctx.fillStyle=c.color;
  ctx.fillRect(c.x-25,c.y-15,50,25);

  // top
  ctx.fillRect(c.x-15,c.y-30,30,15);

  // wheels
  ctx.beginPath();
  ctx.arc(c.x-15,c.y+12,6,0,Math.PI*2);
  ctx.arc(c.x+15,c.y+12,6,0,Math.PI*2);
  ctx.fillStyle="black";
  ctx.fill();
}

function drawBird(b){
  ctx.strokeStyle="black";
  ctx.lineWidth=2;

  ctx.beginPath();
  ctx.arc(b.x,b.y,10,Math.PI,0);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(b.x+18,b.y,10,Math.PI,0);
  ctx.stroke();
}

// ================= LOOP =================

function animate(){

  // sky
  ctx.fillStyle="#5d7ea3";
  ctx.fillRect(0,0,w,h);

  // sun
  ctx.beginPath();
  ctx.arc(w-120,100,50,0,Math.PI*2);
  ctx.fillStyle="yellow";
  ctx.fill();

  // mountains (depth layers)
  drawMountainLayer(h*0.45,1.2,"#5a3e2b");
  drawMountainLayer(h*0.5,1,"#6b4f3a");

  // grass
  ctx.fillStyle="#2fa82f";
  ctx.fillRect(0,h*0.5,w,h);

  // trees
  for(let i=0;i<w;i+=150){
    drawTree(i,h*0.5);
  }

  // roads
  drawRoad(h*0.65);
  drawRoad(h*0.52);

  // cars
  cars.forEach(c=>{
    c.x+=c.speed;
    if(c.speed>0 && c.x>w+50) c.x=-100;
    if(c.speed<0 && c.x<-50) c.x=w+100;
    drawCar(c);
  });

  // rain
  ctx.strokeStyle="lightblue";
  rain.forEach(d=>{
    ctx.beginPath();
    ctx.moveTo(d.x,d.y);
    ctx.lineTo(d.x-4,d.y+12);
    ctx.stroke();

    d.y+=15;
    d.x-=2;

    if(d.y>h){
      d.y=0;
      d.x=rand(0,w);
    }
  });

  // birds
  birds.forEach(b=>{
    drawBird(b);
    b.x+=b.speed;
    if(b.x>w+40) b.x=-40;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
