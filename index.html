<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Modern Realistic Rain Highway</title>
<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#445e78;
}
canvas{display:block;}
#tag{
  position:fixed;
  top:12px;
  left:12px;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
  font-size:18px;
  background:rgba(0,0,0,.25);
  padding:8px 14px;
  border-radius:12px;
}
</style>
</head>
<body>
<div id="tag">Modern Realistic Rain Highway</div>
<canvas id="cv"></canvas>

<script>
const c = document.getElementById("cv");
const x = c.getContext("2d");

let w,h;

function resize(){
  w = c.width = innerWidth;
  h = c.height = innerHeight;
}
addEventListener("resize",resize);
resize();

function rnd(a,b){ return Math.random()*(b-a)+a; }

const rain = [];
for(let i=0;i<220;i++){
  rain.push({x:rnd(0,w), y:rnd(0,h), s:rnd(10,18)});
}

const birds = [];
for(let i=0;i<7;i++){
  birds.push({x:rnd(0,w), y:rnd(40,h*0.28), sp:rnd(1,3)});
}

const carsTop = [];
const carsBottom = [];
const cols = ["#ff3b30","#00c7ff","#ffffff","#ffd60a","#34c759","#ff9f0a","#9b59b6"];

for(let i=0;i<6;i++){
  carsTop.push({
    x:rnd(0,w)+i*220,
    y:h*0.42,
    sp:-3-rnd(0,2),
    col:cols[i%cols.length]
  });
}

for(let i=0;i<6;i++){
  carsBottom.push({
    x:rnd(0,w)-i*220,
    y:h*0.66,
    sp:3+rnd(0,2),
    col:cols[(i+3)%cols.length]
  });
}

function sky(){
  const g = x.createLinearGradient(0,0,0,h);
  g.addColorStop(0,"#5c7897");
  g.addColorStop(.6,"#708ea8");
  g.addColorStop(1,"#7b97aa");
  x.fillStyle = g;
  x.fillRect(0,0,w,h);
}

function sun(){
  x.beginPath();
  x.arc(w-130,110,55,0,Math.PI*2);
  x.fillStyle="rgba(255,235,0,.95)";
  x.fill();
}

function mountains(){
  let base = h*0.42;
  for(let i=-120;i<w+200;i+=180){
    x.beginPath();
    x.moveTo(i,base);
    x.lineTo(i+90,base-110-rnd(0,30));
    x.lineTo(i+180,base);
    x.closePath();
    x.fillStyle="#6f543f";
    x.fill();
  }
}

function grass(y1,y2){
  x.fillStyle="#2faa29";
  x.fillRect(0,y1,w,y2-y1);
}

function road(y){
  x.fillStyle="#303030";
  x.fillRect(0,y,w,95);

  x.strokeStyle="#e9e9e9";
  x.lineWidth=4;
  for(let i=0;i<w;i+=85){
    x.beginPath();
    x.moveTo(i,y+47);
    x.lineTo(i+42,y+47);
    x.stroke();
  }
}

function tree(tx,ty,s=1){
  x.fillStyle="#4b2e16";
  x.fillRect(tx,ty,16*s,55*s);

  x.beginPath();
  x.arc(tx+8*s,ty-6*s,20*s,0,Math.PI*2);
  x.arc(tx-8*s,ty+8*s,18*s,0,Math.PI*2);
  x.arc(tx+25*s,ty+10*s,18*s,0,Math.PI*2);
  x.arc(tx+10*s,ty+22*s,18*s,0,Math.PI*2);
  x.fillStyle="#0b8f13";
  x.fill();
}

function forest(){
  for(let i=0;i<w;i+=160){
    tree(i+20,h*0.48,.95);
  }
}

function car(cx,cy,col,dir=1){
  x.fillStyle=col;

  // body
  x.beginPath();
  x.roundRect(cx-34,cy-14,68,28,8);
  x.fill();

  // top
  x.beginPath();
  x.roundRect(cx-18,cy-30,36,18,8);
  x.fill();

  // wheels
  x.beginPath();
  x.arc(cx-22,cy+16,8,0,Math.PI*2);
  x.arc(cx+22,cy+16,8,0,Math.PI*2);
  x.fillStyle="#111";
  x.fill();

  // headlight
  x.fillStyle="rgba(255,255,180,.9)";
  x.fillRect(dir>0 ? cx+30 : cx-34,cy-7,6,8);
}

function drawBird(b){
  x.strokeStyle="#111";
  x.lineWidth=2;
  x.beginPath();
  x.arc(b.x,b.y,10,Math.PI,0);
  x.stroke();
  x.beginPath();
  x.arc(b.x+18,b.y,10,Math.PI,0);
  x.stroke();
}

function rainfall(){
  x.strokeStyle="rgba(210,240,255,.9)";
  x.lineWidth=1.4;

  rain.forEach(r=>{
    x.beginPath();
    x.moveTo(r.x,r.y);
    x.lineTo(r.x-5,r.y+r.s);
    x.stroke();

    r.y += 12;
    r.x -= 2;

    if(r.y>h){
      r.y = -20;
      r.x = rnd(0,w);
    }
  });
}

function animate(){

  sky();
  sun();
  mountains();

  grass(h*0.42,h*0.53);
  forest();
  road(h*0.53);

  grass(h*0.63,h*0.69);
  road(h*0.69);

  grass(h*0.79,h);

  carsTop.forEach(v=>{
    v.x += v.sp;
    if(v.x < -100) v.x = w+100;
    car(v.x,v.y,v.col,-1);
  });

  carsBottom.forEach(v=>{
    v.x += v.sp;
    if(v.x > w+100) v.x = -100;
    car(v.x,v.y,v.col,1);
  });

  birds.forEach(b=>{
    drawBird(b);
    b.x += b.sp;
    if(b.x>w+30) b.x=-40;
  });

  rainfall();

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
