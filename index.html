<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Rainy Traffic Highway PRO</title>
<style>
html,body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
}
canvas{
    display:block;
}
#label{
    position:fixed;
    top:10px;
    left:12px;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    font-size:16px;
    background:rgba(0,0,0,.28);
    padding:8px 12px;
    border-radius:10px;
    backdrop-filter: blur(4px);
}
</style>
</head>
<body>

<div id="label">Rainy Traffic Highway PRO</div>
<canvas id="cv"></canvas>

<script>
const canvas = document.getElementById("cv");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
addEventListener("resize",resize);
resize();

function rand(a,b){ return Math.random()*(b-a)+a; }
function lerp(a,b,t){ return a+(b-a)*t; }

// ===============================
// WORLD DATA
// ===============================
const drops=[];
const carsTop=[];
const carsBottom=[];
const birds=[];
const clouds=[];
let lightning=0;

// rain
for(let i=0;i<220;i++){
    drops.push({
        x:rand(0,w),
        y:rand(0,h),
        sp:rand(12,22)
    });
}

// top road left-moving
const topColors=["white","silver","pink","lime","cyan","blue"];
for(let i=0;i<7;i++){
    carsTop.push({
        x:w+i*220,
        speed:rand(3,6),
        color:topColors[i%topColors.length]
    });
}

// bottom road right-moving
const botColors=["red","orange","yellow","gold","purple","cyan"];
for(let i=0;i<7;i++){
    carsBottom.push({
        x:-i*220,
        speed:rand(3,6),
        color:botColors[i%botColors.length]
    });
}

// birds
for(let i=0;i<6;i++){
    birds.push({
        x:rand(0,w),
        y:rand(60,h*0.28),
        sp:rand(1.5,3)
    });
}

// clouds
for(let i=0;i<5;i++){
    clouds.push({
        x:rand(0,w),
        y:rand(40,160),
        sp:rand(.15,.45),
        s:rand(90,170)
    });
}

// ===============================
// DRAW HELPERS
// ===============================
function rect(x,y,ww,hh,c){
    ctx.fillStyle=c;
    ctx.fillRect(x,y,ww,hh);
}

function circle(x,y,r,c){
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=c;
    ctx.fill();
}

function mountainRange(y,size,color,offset){
    ctx.fillStyle=color;
    for(let x=-200+offset;x<w+220;x+=200){
        ctx.beginPath();
        ctx.moveTo(x,y);
        ctx.lineTo(x+100,y-size);
        ctx.lineTo(x+200,y);
        ctx.closePath();
        ctx.fill();
    }
}

function drawTree(x,y,tick){
    const sway=Math.sin(tick*0.02+x*0.01)*2;

    rect(x+4+sway,y,10,38,"#4a2f17");
    circle(x+9+sway,y-5,20,"#0b7e0b");
    circle(x-3+sway,y+7,15,"#056805");
    circle(x+22+sway,y+7,15,"#22bb22");
}

function road(y){
    rect(0,y,w,88,"#2d2d2d");

    // wet shine
    ctx.fillStyle="rgba(255,255,255,.04)";
    ctx.fillRect(0,y+4,w,8);

    ctx.strokeStyle="white";
    ctx.lineWidth=3;

    for(let i=0;i<w;i+=60){
        ctx.beginPath();
        ctx.moveTo(i,y+44);
        ctx.lineTo(i+30,y+44);
        ctx.stroke();
    }
}

function drawCar(x,y,color,dir,night){
    // reflection
    ctx.fillStyle="rgba(255,255,255,.05)";
    ctx.fillRect(x-28,y+18,56,4);

    // body
    rect(x-28,y-16,56,24,color);
    rect(x-16,y-30,32,16,color);

    // wheels
    circle(x-18,y+12,7,"black");
    circle(x+18,y+12,7,"black");

    // headlights
    if(night){
        ctx.fillStyle="rgba(255,255,180,.65)";
        if(dir==="left"){
            ctx.fillRect(x-34,y-8,8,5);
        }else{
            ctx.fillRect(x+26,y-8,8,5);
        }
    }
}

function drawBird(b,tick){
    const flap=Math.sin(tick*0.18+b.x*0.01)*4;

    ctx.strokeStyle="black";
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.arc(b.x,b.y,10+flap,Math.PI,0);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(b.x+18,b.y,10-flap,Math.PI,0);
    ctx.stroke();
}

function drawCloud(c){
    ctx.fillStyle="rgba(255,255,255,.28)";
    circle(c.x,c.y,26);
    circle(c.x+28,c.y-8,34);
    circle(c.x+60,c.y,28);
    circle(c.x+30,c.y+10,30);
}

// ===============================
// TIME CYCLE
// 0..1..0 style loop
// ===============================
let tick=0;

function getCycle(){
    const t=(Math.sin(tick*0.002)+1)/2; // 0..1
    return t;
}

function skyColor(t){
    // 0 night, .5 evening/day, 1 bright day
    const r=Math.floor(lerp(25,95,t));
    const g=Math.floor(lerp(35,135,t));
    const b=Math.floor(lerp(70,170,t));
    return `rgb(${r},${g},${b})`;
}

// ===============================
// LOOP
// ===============================
function animate(){

    tick++;

    const cyc=getCycle();
    const isNight=cyc<0.28;
    const evening=cyc>=0.28 && cyc<0.55;

    // sky
    rect(0,0,w,h,skyColor(cyc));

    // occasional lightning at night
    if(isNight && Math.random()<0.003){
        lightning=8;
    }
    if(lightning>0){
        ctx.fillStyle="rgba(255,255,255,.35)";
        ctx.fillRect(0,0,w,h);
        lightning--;
    }

    // sun/moon position
    const sx=w-120;
    const sy=100;

    if(isNight){
        circle(sx,sy,45,"#f2f2d8");
        circle(sx+12,sy-8,38,"rgba(0,0,0,.18)");
    }else{
        circle(sx,sy,52, evening ? "#ffcf66" : "yellow");
    }

    // clouds
    clouds.forEach(c=>{
        drawCloud(c);
        c.x+=c.sp;
        if(c.x>w+120)c.x=-140;
    });

    // mountains
    mountainRange(h*0.46,170,"#4f3828",tick*0.03%200);
    mountainRange(h*0.50,120,"#6b4f3a",tick*0.05%200);

    // grass
    rect(0,h*0.50,w,h*0.50,isNight ? "#1f6f1f" : "#2faa2f");

    // trees
    for(let x=-20;x<w+60;x+=150){
        drawTree(x,h*0.50,tick);
    }

    // roads
    const roadTop=h*0.54;
    const roadBottom=h*0.72;

    road(roadTop);
    road(roadBottom);

    // top cars left
    carsTop.forEach(c=>{
        c.x-=c.speed;
        if(c.x<-120)c.x=w+120;
        drawCar(c.x,roadTop+44,c.color,"left",isNight);
    });

    // bottom cars right
    carsBottom.forEach(c=>{
        c.x+=c.speed;
        if(c.x>w+120)c.x=-120;
        drawCar(c.x,roadBottom+44,c.color,"right",isNight);
    });

    // birds only daytime
    if(!isNight){
        birds.forEach(b=>{
            drawBird(b,tick);
            b.x+=b.sp;
            if(b.x>w+40)b.x=-40;
        });
    }

    // rain
    ctx.strokeStyle="rgba(190,235,255,.9)";
    ctx.lineWidth=1.5;

    drops.forEach(d=>{
        ctx.beginPath();
        ctx.moveTo(d.x,d.y);
        ctx.lineTo(d.x-5,d.y+14);
        ctx.stroke();

        d.y+=d.sp;
        d.x-=2;

        if(d.y>h){
            d.y=-20;
            d.x=rand(0,w);
        }
    });

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
